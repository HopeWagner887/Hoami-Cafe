<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOAMI CAFE - Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#4b4b4b;
}

.menu-section{
    padding:80px 20px;
    text-align:center;
}

.menu-section h3{
    font-size:34px;
    color:#7A9E7E;
    margin-bottom:40px;
}

.menu-list{
    display:flex;
    flex-direction:row;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.menu-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 15px;
    background:transparent;
    border-radius:12px;
    text-decoration:none;
}

.menu-item img{
    width:60px;
    height:60px;
    border-radius:10px;
    object-fit:cover;
}

.menu-name{
    font-size:16px;
    color:white;
    font-weight:500;
}

.price{
    color:#7A9E7E;
    font-weight:600;
    margin-left:8px;
}

</style>
</head>

<body>

<section class="menu-section">

<h3>Our Popular Choices</h3>

<div class="menu-list">

<a href="example.html" class="menu-item">
<img src="matcha.jpg">
<span class="menu-name">Matcha</span>
<span class="price">R45</span>
</a>

<a href="example.html" class="menu-item">
<img src="boba_tea.jpg">
<span class="menu-name">Boba Tea</span>
<span class="price">R50</span>
</a>

<a href="example.html" class="menu-item">
<img src="brewed_coffee.jpg">
<span class="menu-name">Brewed Coffee</span>
<span class="price">R40</span>
</a>

<a href="example.html" class="menu-item">
<img src="croissant.jpg">
<span class="menu-name">Stuffed Croissant</span>
<span class="price">R35</span>
</a>

<a href="example.html" class="menu-item">
<img src="muffins.jpg">
<span class="menu-name">Muffins</span>
<span class="price">R30</span>
</a>

<a href="example.html" class="menu-item">
<img src="cheesecake.jpg">
<span class="menu-name">Cheesecake Slices</span>
<span class="price">R55</span>
</a>

</div>

</section>

</body>
</html>
